# PASS OPTIONS LIKE: -e "rspace_home=/home/ramon/docker-april-26-ansbile rspace_url=https://myrspaceurl.com"
# When deployed via SURF ResearchCloud, rspace_url is injected automatically as the bare
# workspace FQDN (e.g. myworkspace.cloud.surf.nl) the playbook will prepend https:// if needed.
# db_password and db_root_password are both auto-generated on first deploy and persisted in docker-compose.yaml.
# Docker is installed by this playbook, no separate Docker Environment component needed.
# The only mandatory option is rspace_url, the rest will use defaults below.
# storage_name should be the name of the SURF persistent volume (e.g. rspace-storage) — the mount path /data/<storage_name> is derived automatically.
---
- hosts: localhost
  become: yes
  vars:
    repo_url: "https://github.com/rspace-os/rspace-docker.git"
    storage_path: "/data/{{ storage_name }}"
    rspace_home: "/data/{{ storage_name }}/rspace-docker"
    rspace_config: "/data/{{ storage_name }}/rspace-config"
 
  tasks:
    - name: Derive hostnames from rspace_url
      set_fact:
        apache_hostname: "{{ rspace_url | replace('https://', '') }}"
 
    # ------------------------------------------------------------------
    # VERIFY PERSISTENT STORAGE IS ATTACHED
    # Fails immediately with a clear message if no volume is mounted at storage_path
    # ------------------------------------------------------------------
    - name: Verify persistent storage volume is attached
      assert:
        that:
          - ansible_mounts | selectattr('mount', 'equalto', storage_path) | list | length > 0
        fail_msg: "No storage volume is mounted at {{ storage_path }}. Please attach a persistent storage volume in the ResearchCloud portal before deploying."
        quiet: yes
 
    # ------------------------------------------------------------------
    # DOCKER INSTALL
    # docker.io and docker-compose-v2 are available directly from the ubuntu 24.04 repos
    # ------------------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
 
    - name: Install Docker and dependencies
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - jq
          - git
        state: present
 
    # ------------------------------------------------------------------
    # PERSISTENT STORAGE SETUP
    # ------------------------------------------------------------------
    - name: Check if Docker volumes are already on persistent storage
      stat:
        path: "{{ storage_path }}/docker-volumes"
      register: docker_volumes_dir
 
    - name: Ensure Docker is enabled and started
      systemd:
        name: docker
        state: started
        enabled: yes
 
    - name: Stop Docker to safely move volumes directory
      systemd:
        name: docker
        state: stopped
      when: not docker_volumes_dir.stat.exists
 
    - name: Move Docker volumes directory to persistent storage
      shell: |
        mv /var/lib/docker/volumes "{{ storage_path }}/docker-volumes"
      when: not docker_volumes_dir.stat.exists
 
    - name: Remove default Docker volumes directory before symlinking
      shell: |
        rm -rf /var/lib/docker/volumes

    - name: Symlink Docker volumes directory to persistent storage
      file:
        src: "{{ storage_path }}/docker-volumes"
        dest: /var/lib/docker/volumes
        state: link
        force: yes
 
    - name: Start Docker after volumes migration
      systemd:
        name: docker
        state: started
      when: not docker_volumes_dir.stat.exists
 
    # ------------------------------------------------------------------
    # RSPACE DOCKER CONFIG FOLDER SETUP
    # rspace_home lives on the persistent volume so all config,
    # passwords, certs and docker-compose.yaml survive workspace rebuilds.
    # ------------------------------------------------------------------
    - name: Ensure RSpace home directory exists
      file:
        path: "{{ rspace_home }}"
        state: directory
        mode: '0755'
 
    - name: Clone or update RSpace Docker repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ rspace_home }}"
        version: main
        force: yes
 
    # ------------------------------------------------------------------
    # DEPLOYMENT.PROPERTIES
    # Kept in rspace-config on the persistent volume, separate from
    # rspace_home so it survives git clones which overwrite everything else.
    # ------------------------------------------------------------------
    - name: Ensure rspace-config directory exists on persistent storage
      file:
        path: "{{ rspace_config }}"
        state: directory
        mode: '0755'
 
    - name: Copy deployment.properties to persistent config on first deploy
      copy:
        src: "{{ rspace_home }}/deployment.properties"
        dest: "{{ rspace_config }}/deployment.properties"
        remote_src: yes
        force: no
 
    - name: Update deployment.properties bind mount in docker-compose.yaml
      replace:
        path: "{{ rspace_home }}/docker-compose.yaml"
        regexp: 'source: ./deployment.properties'
        replace: "source: {{ rspace_config }}/deployment.properties"
 
    # ------------------------------------------------------------------
    # Generate all the random passwords
    # ------------------------------------------------------------------
    - name: Generate a random database password
      set_fact:
        db_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
 
    - name: Generate a random root password
      set_fact:
        db_root_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
 
    - name: Generate a random JavaMelody password
      set_fact:
        javamelody_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
 
    # ------------------------------------------------------------------
    # Replace password defaults with the just generated ones
    # ------------------------------------------------------------------
    - name: Replace MariaDB password in docker-compose.yaml
      replace:
        path: "{{ rspace_home }}/docker-compose.yaml"
        regexp: 'MARIADB_PASSWORD: rspacedocker'
        replace: "MARIADB_PASSWORD: {{ db_password }}"
 
    - name: Replace MariaDB root password in docker-compose.yaml
      replace:
        path: "{{ rspace_home }}/docker-compose.yaml"
        regexp: 'MARIADB_ROOT_PASSWORD: rspacedocker'
        replace: "MARIADB_ROOT_PASSWORD: {{ db_root_password }}"
 
    - name: Replace JDBC password in deployment.properties
      replace:
        path: "{{ rspace_config }}/deployment.properties"
        regexp: 'jdbc.password=rspacedocker'
        replace: "jdbc.password={{ db_password }}"
 
    - name: Set JavaMelody monitoring password in rspace.env
      lineinfile:
        path: "{{ rspace_home }}/configs/rspace.env"
        regexp: '.*javamelody\.authorized-users.*'
        line: 'CATALINA_OPTS="$CATALINA_OPTS -Djavamelody.authorized-users=rspacemonitoring:{{ javamelody_password }}"'
 
    # ------------------------------------------------------------------
    - name: Get latest RSpace OS version from GitHub
      shell: |
        curl -s "https://api.github.com/repos/rspace-os/rspace-web/releases" \
        | jq -r '.[0].tag_name'
      register: latest_version
      changed_when: false
 
    - name: Download latest RSpace .war file
      get_url:
        url: "https://github.com/rspace-os/rspace-web/releases/download/{{ latest_version.stdout }}/researchspace-{{ latest_version.stdout }}.war"
        dest: "{{ rspace_home }}/rspace.war"
        mode: '0644'
 
    - name: Set hostname in deployment.properties
      replace:
        path: "{{ rspace_config }}/deployment.properties"
        regexp: 'server\.urls\.prefix=.*'
        replace: "server.urls.prefix=https://{{ rspace_url }}"
 
    - name: Replace standard server.xml file with HTTP2 one
      block:
        - name: Remove old file
          file:
            path: "{{ rspace_home }}/configs/server.xml"
            state: absent
 
        - name: Set new server xml file
          copy:
            src: "{{ rspace_home }}/extras/server-xml-example-http2.conf"
            dest: "{{ rspace_home }}/configs/server.xml"
 
    - name: Expose only HTTP2 on localhost in docker-compose.yaml
      replace:
        path: "{{ rspace_home }}/docker-compose.yaml"
        regexp: "- '8080:8080'"
        replace: "- '127.0.0.1:8443:8443'"
 
    # --------------------------------------------------
    # Add custom SURF details in RSpace about page
    # --------------------------------------------------
    - name: Add SURF details to RSpace about popup
      lineinfile:
        path: "{{ rspace_config }}/deployment.properties"
        regexp: "^deployment.description="
        line: "deployment.description=This version of RSpace was installed as part of a SURF catalog item on SURF ResearchCloud. More information can be found under the catalog details in ResearchCloud or at http://documentation.researchspace.com/research-clouds"
        state: present
 
    # -------------------------------------------------------
    # set the cert paths for http2 setup in tomcat container
    # its ok to keep this here, tomcat will not look for the
    # certs until it has booted and that docker command is
    # right at the end. Bear in mind that the certs are kept
    # at /etc/rspace-docker/certs on the host, but also that
    # same path in the container so that tomcat container can
    # read them.
    # -------------------------------------------------------
    - name: Set cert key path in server.xml
      replace:
        path: "{{ rspace_home }}/configs/server.xml"
        regexp: 'certificateKeyFile="[^"]*"'
        replace: 'certificateKeyFile="/etc/rspace-docker/certs/privkey.pem"'
 
    - name: Set cert file path in server.xml
      replace:
        path: "{{ rspace_home }}/configs/server.xml"
        regexp: 'certificateFile="[^"]*"'
        replace: 'certificateFile="/etc/rspace-docker/certs/cert.pem"'
 
    - name: Set cert chain file path in server.xml
      replace:
        path: "{{ rspace_home }}/configs/server.xml"
        regexp: 'certificateChainFile="[^"]*"'
        replace: 'certificateChainFile="/etc/rspace-docker/certs/chain.pem"'
 
    # ------------------------------------------------------------------
    # APACHE2 + CERTBOT INSTALL
    # 
    #   1. Install Apache and certbot
    #   2. Stop Apache so port 80 is free for certbot standalone challenge
    #   3. Run certbot to obtain the cert
    #   4. Deploy the vhost config
    #   5. Start Apache with SSL working
    # ------------------------------------------------------------------
    - name: Kill anything bound to ports 80 or 443 before we start
      shell: |
        if command -v fuser >/dev/null 2>&1; then
          fuser -k 80/tcp || true
          fuser -k 443/tcp || true
        fi
      changed_when: false
 
    - name: Install Apache2 and certbot
      apt:
        name:
          - apache2
          - certbot
        state: present
 
    - name: Enable required Apache modules
      community.general.apache2_module:
        name: "{{ item }}"
        state: present
      loop:
        - remoteip
        - http2
        - proxy
        - proxy_http
        - headers
        - ssl
 
    - name: Disable the default Apache site
      command: a2dissite 000-default
      args:
        removes: /etc/apache2/sites-enabled/000-default.conf
 
    - name: Stop Apache so port 80 is free for certbot standalone challenge
      systemd:
        name: apache2
        state: stopped
 
    - name: Obtain Let's Encrypt certificate (standalone mode)
      command: >
        certbot certonly
        --standalone
        --non-interactive
        --agree-tos
        --register-unsafely-without-email
        -d {{ apache_hostname }}
      args:
        creates: "/etc/letsencrypt/live/{{ apache_hostname }}/fullchain.pem"
 
    - name: Deploy RSpace Apache vhost with SSL
      copy:
        dest: "/etc/apache2/sites-available/{{ apache_hostname }}-rspace.conf"
        owner: root
        group: root
        mode: '0644'
        content: |
          <VirtualHost *:80>
              ServerName {{ apache_hostname }}
              Redirect permanent / https://{{ apache_hostname }}/
              RemoteIPHeader X-Forwarded-For
          </VirtualHost>
 
          <VirtualHost *:443>
              ServerName {{ apache_hostname }}
              Protocols h2 http/1.1
              ProxyRequests Off
              ProxyPreserveHost On
              Header always set Strict-Transport-Security "max-age=600;"
              Header edit Set-Cookie ^(.*)$ $1;SameSite=None
              SSLProxyEngine on
              RemoteIPHeader X-Forwarded-For
              ProxyPass /.well-known !
              ProxyPass / https://127.0.0.1:8443/
              ProxyPassReverse / https://127.0.0.1:8443/
              SSLCertificateFile /etc/letsencrypt/live/{{ apache_hostname }}/fullchain.pem
              SSLCertificateKeyFile /etc/letsencrypt/live/{{ apache_hostname }}/privkey.pem
              SSLProxyEngine on
              SSLProxyVerify none
              SSLProxyCheckPeerCN off
              SSLProxyCheckPeerName off
          </VirtualHost>
 
    - name: Enable the RSpace Apache vhost
      command: "a2ensite {{ apache_hostname }}-rspace.conf"
      args:
        creates: "/etc/apache2/sites-enabled/{{ apache_hostname }}-rspace.conf"
 
    - name: Set up certbot auto-renewal cron job
      cron:
        name: "certbot renewal"
        minute: "0"
        hour: "3"
        weekday: "1"
        job: "certbot renew --pre-hook 'systemctl stop apache2' --deploy-hook 'cp /etc/letsencrypt/live/{{ apache_hostname }}/*.pem {{ rspace_home }}/certs/ && docker compose -f {{ rspace_home }}/docker-compose.yaml restart rspace-app' --post-hook 'systemctl start apache2' --quiet"
 
    - name: Start and enable Apache2
      systemd:
        name: apache2
        state: started
        enabled: yes
 
    # --------------------------------------------------------------------------
    # Mount LE certs into rspace-app so they can be used on the http2 connector
    # This has to be done after the certs have been generated
    # --------------------------------------------------------------------------
    - name: Create rspace certs directory
      file:
        path: "{{ rspace_home }}/certs"
        state: directory
        mode: '0755'
 
    - name: Copy LE certs into rspace certs directory
      copy:
        src: "/etc/letsencrypt/live/{{ apache_hostname }}/{{ item }}"
        dest: "{{ rspace_home }}/certs/{{ item }}"
        remote_src: yes
        mode: '0644'
      loop:
        - fullchain.pem
        - cert.pem
        - chain.pem
 
    - name: Copy LE privkey into rspace certs directory
      copy:
        src: "/etc/letsencrypt/live/{{ apache_hostname }}/privkey.pem"
        dest: "{{ rspace_home }}/certs/privkey.pem"
        remote_src: yes
        mode: '0640'
 
    - name: Mount rspace certs directory into rspace-app container
      lineinfile:
        path: "{{ rspace_home }}/docker-compose.yaml"
        insertbefore: '      ports:'
        line: "        - ./certs:/etc/rspace-docker/certs:ro"
 
    # ------------------------------------------------------------------
    # START RSPACE CONTAINERS
    # ------------------------------------------------------------------
    - name: Start containers with Docker Compose
      shell: |
        if command -v docker &>/dev/null && docker compose version &>/dev/null; then
          docker compose up -d
        else
          docker-compose up -d
        fi
      args:
        chdir: "{{ rspace_home }}"
 
  handlers:
    - name: Restart apache2
      systemd:
        name: apache2
        state: restarted
