# PASS OPTIONS LIKE: -e "rspace_home=/home/ramon/docker-april-26-ansbile db_password=sdsS15ALLASFD34 rspace_url=https://myrspaceurl.com"
# When deployed via SURF ResearchCloud, rspace_url is injected automatically as the bare
# workspace FQDN (e.g. myworkspace.cloud.surf.nl) – the playbook will prepend https:// if needed.
# The only mandatory option is rspace_url, the rest will use defaults below.
# This uses the Docker Container SURF catalog item which pre-installs docker compose and nginx 
---
- hosts: localhost
  become: yes
  vars:
    # default values if not specified
    rspace_home: "/etc/rspace-docker"
    # this is a default random value and should really be changed or set as a paramater 
    db_password: "L6vz2100zxaadutlsgsd"
    # repo with all the config files
    repo_url: "https://github.com/rspace-os/rspace-docker.git"

  tasks:

    # ------------------------------------------------------------------
    # Normalise rspace_url: ResearchCloud passes workspace_fqdn as a bare
    # hostname (no scheme). Prepend https:// so the rest of the playbook
    # always has a fully-qualified URL to work with.
    # ------------------------------------------------------------------
    - name: Prepend https:// to rspace_url if no scheme is present
      set_fact:
        rspace_url: "https://{{ rspace_url }}"
      when:
        - rspace_url is defined
        - not rspace_url.startswith('https://')

    - name: Ensure rspace_url was provided and starts with https://
      assert:
        that:
          - rspace_url is defined
          - rspace_url | length > 0
          - rspace_url is match('^https://')
        fail_msg: "rspace_url is required and must start with https://. Pass it with -e 'rspace_url=https://myrspaceurl.com'"
        quiet: yes


    - name: Ensure RSpace home directory exists
      file:
        path: "{{ rspace_home }}"
        state: directory
        mode: '0755'

    - name: Clone or update RSpace Docker repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ rspace_home }}"
        version: main
        force: yes

    - name: Get latest RSpace OS version from GitHub
      shell: |
        curl -s "https://api.github.com/repos/rspace-os/rspace-web/releases" \
        | jq -r '.[0].tag_name'
      register: latest_version
      changed_when: false

    - name: Download latest RSpace .war file
      get_url:
        url: "https://github.com/rspace-os/rspace-web/releases/download/{{ latest_version.stdout }}/researchspace-{{ latest_version.stdout }}.war"
        dest: "{{ rspace_home }}/rspace.war"
        mode: '0644'

    - name: Replace MariaDB password in docker-compose.yaml with variable specified
      replace:
        path: "{{ rspace_home }}/docker-compose.yaml"
        regexp: 'MARIADB_PASSWORD: rspacedocker'
        replace: "MARIADB_PASSWORD: {{ db_password }}"

    - name: Replace JDBC password in deployment.properties with variable specified
      replace:
        path: "{{ rspace_home }}/deployment.properties"
        regexp: 'jdbc.password=rspacedocker'
        replace: "jdbc.password={{ db_password }}"

    - name: Set hostname in deployment.properties
      replace:
        path: "{{ rspace_home }}/deployment.properties"
        regexp: 'server.urls.prefix=http://localhost:8080'
        replace: "server.urls.prefix={{ rspace_url }}"

    - name: Replace standard server.xml file with one with AJP enabled and HTTP disabled
      block:
        - name: Remove old file
          file:
            path: "{{ rspace_home }}/configs/server.xml"
            state: absent

        - name: set new server xml file
          copy:
            src: "{{ rspace_home }}/extras/server-xml-example-ajp.conf"
            dest: "{{ rspace_home }}/configs/server.xml"

    - name: Expose only AJP on localhost in docker-compose.yaml
      replace:
        path: "{{ rspace_home }}/docker-compose.yaml"
        regexp: "- '8080:8080'"
        replace: "- '127.0.0.1:8009:8009'"

    - name: Add SURF details to RSpace about popup
      lineinfile:
        path: "{{ rspace_home }}/deployment.properties"
        line: "deployment.description=This version of RSpace was installed as part of a SURF catalog item on SURF ResearchCloud. More information can be found under the catalog details in ResearchCloud or at https://researchspace.com/surf-research-cloud"
        insertafter: EOF
        state: present


    # ------------------------------------------------------------------
    # RSPACE SETUP END. APACHE SETUP START
    # ------------------------------------------------------------------

    - name: Derive Apache hostname from rspace_url
      set_fact:
        apache_hostname: "{{ rspace_url | replace('https://', '') }}"

    - name: Check whether nginx is installed
      command: dpkg-query -W -f='${Status}' nginx
      register: nginx_pkg
      failed_when: false
      changed_when: false

    - name: Stop and disable nginx if installed
      systemd:
        name: nginx
        state: stopped
        enabled: false
      when: "'install ok installed' in nginx_pkg.stdout"
      failed_when: false

    - name: Purge nginx packages
      apt:
        name:
          - nginx
          - nginx-common
          - nginx-core
          - nginx-full
          - nginx-light
          - nginx-extras
        state: absent
        purge: yes
        autoremove: yes
      when: "'install ok installed' in nginx_pkg.stdout"

    - name: Kill anything still bound to ports 80 or 443
      shell: |
        set -e
        if command -v fuser >/dev/null 2>&1; then
          fuser -k 80/tcp || true
          fuser -k 443/tcp || true
        fi
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install apache2
      apt:
        name: apache2
        state: present

    - name: Enable required Apache modules
      community.general.apache2_module:
        name: "{{ item }}"
        state: present
      loop:
        - remoteip
        - http2
        - proxy
        - proxy_http
        - proxy_ajp
        - headers
        - ssl
      notify: Restart apache2

    - name: Disable the default Apache site
      command: a2dissite 000-default
      args:
        removes: /etc/apache2/sites-enabled/000-default.conf
      notify: Restart apache2

    - name: Deploy RSpace Apache vhost
      copy:
        dest: "/etc/apache2/sites-available/{{ apache_hostname }}-rspace.conf"
        owner: root
        group: root
        mode: '0644'
        content: |
          <VirtualHost *:80>
              ServerName {{ apache_hostname }}
              Redirect permanent / https://{{ apache_hostname }}/
              RemoteIPHeader X-Forwarded-For
          </VirtualHost>

          <VirtualHost *:443>
              ServerName {{ apache_hostname }}
              Protocols h2 http/1.1
              ProxyRequests Off
              ProxyPreserveHost On
              Header always set Strict-Transport-Security "max-age=600;"
              Header edit Set-Cookie ^(.*)$ $1;SameSite=None
              SSLProxyEngine on
              RemoteIPHeader X-Forwarded-For
              ProxyPass /.well-known !
              ProxyPass / ajp://127.0.0.1:8009/
              ProxyPassReverse / ajp://127.0.0.1:8009/
              SSLCertificateFile /etc/letsencrypt/live/{{ apache_hostname }}/fullchain.pem
              SSLCertificateKeyFile /etc/letsencrypt/live/{{ apache_hostname }}/privkey.pem
          </VirtualHost>
      notify: Restart apache2

    - name: Enable the RSpace Apache vhost
      command: "a2ensite {{ apache_hostname }}-rspace.conf"
      args:
        creates: "/etc/apache2/sites-enabled/{{ apache_hostname }}-rspace.conf"
      notify: Restart apache2

    - name: Ensure apache2 is enabled and started
      systemd:
        name: apache2
        state: started
        enabled: yes

    # ------------------------------------------------------------------

    - name: Start containers with Docker Compose (fallback if needed)
      shell: |
        if command -v docker &>/dev/null && docker compose version &>/dev/null; then
          docker compose up -d
        else
          docker-compose up -d
        fi
      args:
        chdir: "{{ rspace_home }}"

  handlers:
    - name: Restart apache2
      systemd:
        name: apache2
        state: restarted
