rspace-researchdrive-bridge:
  image: rclone/rclone:latest
  container_name: rspace-researchdrive-bridge
  restart: unless-stopped
  environment:
    - NEXTCLOUD_BASE_URL=https://demo.data.surf.nl
  volumes:
    - RESEARCHDRIVE_ENTRYPOINT_PLACEHOLDER:/entrypoint.sh:ro
    - RESEARCHDRIVE_AUTH_PROXY_PLACEHOLDER:/auth_proxy.py
    - RESEARCHDRIVE_KEYS_DIR_PLACEHOLDER:/data/keys
  entrypoint: ["/bin/sh", "/entrypoint.sh"]
